  <script id="4" type="module" pinned="">
    // Visualization of the stream of consciousness text with animated sinking/rising words
    const text = `I realize I am dreaming ocean whispers my name soft like wind through grass standing alone beach stretches forever violet sky water liquid glass waves rolling slowly deliberately something important to say come closer ocean murmurs stepping forward feet warm sand not afraid strangely air rain something sweet can't place water touches toes whispers clearer hundreds voices fragments stories laughter secrets horizon bends upward curtain pulled back impossible things floating cities cloud staircases light birds taking another step water suddenly breathing beneath surface ocean cathedral swimming deeper following voices something can't name desperately need to find floating weightless voices calling deeper deeper into blue cathedral of dreams where time bends and words dissolve into pure feeling pure knowing pure being in this endless underwater sky...`;

    // Split into words and create data for visualization
    const words = text.split(/\s+/);
    const width = 800;
    const height = 600;

    // Initialize word data with animation properties
    let wordData = words.map((word, i) => ({
      word: word.replace(/[.,;:!?]/g, ''), // Clean punctuation
      index: i,
      length: word.length,
      x: (i % 20) * 40 + Math.random() * 20,
      y: Math.floor(i / 20) * 30 + Math.random() * 15,
      baseY: Math.floor(i / 20) * 30 + Math.random() * 15, // Store original Y position
      velocity: (Math.random() - 0.5) * 2, // Random velocity between -1 and 1
      speed: 0.5 + Math.random() * 1.5, // Random speed multiplier
      lightness: 0.3 + Math.random() * 0.7, // Random initial lightness
      lightnessDirection: Math.random() > 0.5 ? 1 : -1, // Direction of lightness change
      lightnessSpeed: 0.005 + Math.random() * 0.01 // Speed of lightness change
    }));

    // Create container div
    const container = display(htl.html`<div style="width: ${width}px; height: ${height}px; position: relative; overflow: hidden; background: linear-gradient(to bottom, #e6f3ff 0%, #003366 100%);"></div>`);

    // Create SVG
    const svg = htl.svg`<svg width="${width}" height="${height}" style="position: absolute; top: 0; left: 0; font-family: 'Georgia', serif;">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
    </svg>`;

    container.appendChild(svg);

    // Animation function
    let frame;

    function animate() {
      // Update each word's position and lightness
      wordData.forEach(d => {
        // Update vertical position with random movement
        d.y += d.velocity * d.speed;

        // Reverse direction if hitting boundaries, with some randomness
        if (d.y < 50 || d.y > height - 50) {
          d.velocity *= -1;
          d.velocity += (Math.random() - 0.5) * 0.5; // Add some randomness to velocity
        }

        // Occasionally change direction randomly
        if (Math.random() < 0.01) {
          d.velocity = (Math.random() - 0.5) * 2;
        }

        // Update lightness
        d.lightness += d.lightnessDirection * d.lightnessSpeed;

        // Reverse lightness direction if hitting boundaries
        if (d.lightness <= 0.2 || d.lightness >= 0.9) {
          d.lightnessDirection *= -1;
        }

        // Clamp lightness values
        d.lightness = Math.max(0.2, Math.min(0.9, d.lightness));
      });

      // Clear and redraw all text elements
      const textElements = svg.querySelectorAll('text');
      textElements.forEach(el => el.remove());

      // Add updated text elements
      wordData.forEach(d => {
        const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        textEl.setAttribute("x", d.x);
        textEl.setAttribute("y", d.y);

        // Calculate color based on lightness and position
        const hue = d.index < 50 ? 210 : d.index < 100 ? 220 : 230; // Blue hues
        const saturation = 60 + d.lightness * 40; // Vary saturation
        const lightness = 20 + d.lightness * 60; // Vary lightness

        textEl.setAttribute("fill", `hsl(${hue}, ${saturation}%, ${lightness}%)`);
        textEl.setAttribute("opacity", d.lightness);
        textEl.setAttribute("font-size", `${Math.max(10, 16 - d.length * 0.5)}px`);

        if (d.word === 'ocean' || d.word === 'dreams' || d.word === 'cathedral') {
          textEl.setAttribute("filter", "url(#glow)");
        }

        if (d.word === 'I') {
          textEl.setAttribute("font-weight", "bold");
        }

        textEl.textContent = d.word;
        svg.appendChild(textEl);
      });

      frame = requestAnimationFrame(animate);
    }

    // Start animation
    animate();

    // Stop animation when cell is invalidated
    invalidation.then(() => cancelAnimationFrame(frame));
  </script>
