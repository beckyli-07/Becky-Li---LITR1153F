  <script id="2" type="text/markdown">
    # Markov Models

    A **Markov model** is a stochastic process where the probability of each event depends only on the state attained in the previous event. Named after Russian mathematician Andrey Markov, these models are fundamental to understanding probabilistic systems with "memoryless" properties.

    ## Key Concepts

    - **Markov Property**: The future state depends only on the current state, not on the sequence of events that preceded it
    - **State Space**: The set of all possible states in the system
    - **Transition Matrix**: Defines the probabilities of moving from one state to another
    - **Stationary Distribution**: The long-run probability distribution over states

    ## Applications

    Markov models are widely used in:
    - Natural language processing (text generation)
    - Finance (stock price modeling)
    - Biology (gene sequencing)
    - Weather prediction
    - Machine learning algorithms

  <script id="3" type="module" pinned="">
    // Simple Markov Chain Text Generator
    // This will be our foundation for building more complex generators

    class MarkovChain {
      constructor(order = 1) {
        this.order = order;
        this.chain = new Map();
      }

      // Train the model on input text
      train(text) {
        const words = text.toLowerCase().split(/\s+/).filter(word => word.length > 0);

        for (let i = 0; i <= words.length - this.order; i++) {
          const state = words.slice(i, i + this.order).join(' ');
          const nextWord = words[i + this.order];

          if (!this.chain.has(state)) {
            this.chain.set(state, []);
          }

          if (nextWord) {
            this.chain.get(state).push(nextWord);
          }
        }
      }

      // Generate text of specified length
      generate(length = 50, seed = null) {
        if (this.chain.size === 0) return "No training data available.";

        // Choose starting state
        let currentState;
        if (seed && seed.trim()) {
          const seedWords = seed.toLowerCase().split(/\s+/).slice(-this.order);
          if (seedWords.length === this.order) {
            const seedState = seedWords.join(' ');
            currentState = this.chain.has(seedState) ? seedState :
                          [...this.chain.keys()][Math.floor(Math.random() * this.chain.size)];
          } else {
            // Find a state that contains some of the seed words
            const possibleStates = [...this.chain.keys()].filter(state =>
              seedWords.some(word => state.includes(word))
            );
            currentState = possibleStates.length > 0 ?
                          possibleStates[Math.floor(Math.random() * possibleStates.length)] :
                          [...this.chain.keys()][Math.floor(Math.random() * this.chain.size)];
          }
        } else {
          currentState = [...this.chain.keys()][Math.floor(Math.random() * this.chain.size)];
        }

        const result = currentState.split(' ');

        for (let i = 0; i < length - this.order; i++) {
          const possibleNext = this.chain.get(currentState);
          if (!possibleNext || possibleNext.length === 0) break;

          const nextWord = possibleNext[Math.floor(Math.random() * possibleNext.length)];
          result.push(nextWord);

          // Update current state
          const stateWords = currentState.split(' ');
          stateWords.shift();
          stateWords.push(nextWord);
          currentState = stateWords.join(' ');

          if (!this.chain.has(currentState)) break;
        }

        return result.join(' ');
      }

      // Get statistics about the model
      getStats() {
        return {
          states: this.chain.size,
          order: this.order,
          totalTransitions: [...this.chain.values()].reduce((sum, arr) => sum + arr.length, 0)
        };
      }
    }

    // Create a simple example
    const markov = new MarkovChain(2);
    display("Markov Chain Text Generator initialized!");
  </script>

  <script id="10" type="text/markdown">
    ## Professor Speech Pattern Analysis

    This Markov model captures several distinctive patterns in your professor's communication style:

    - **Casual openings**: "hello all,"
    - **Technical instructions**: References to specific files, folders, and setup procedures
    - **Parenthetical clarifications**: Frequent use of parentheses to add context
    - **Encouraging language**: "you can look into this", "if you'd like", "do have a look"
    - **Academic references**: Citations and technical terminology
    - **Structured assignments**: Clear but open-ended task descriptions

    The model learns these patterns and can generate new text that sounds remarkably similar to your professor's actual communication style!
  </script>
